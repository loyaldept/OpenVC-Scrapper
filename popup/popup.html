<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenVC Scrapper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>OpenVC Scrapper</h1>
      <p class="subtitle">Extract VC contact info from OpenVC</p>
    </header>

    <!-- Status Banner -->
    <div id="status-banner" class="status-banner hidden">
      <span id="status-text"></span>
    </div>

    <!-- Not on OpenVC warning -->
    <div id="not-on-openvc" class="warning hidden">
      <p>⚠ Navigate to <strong>openvc.app</strong> to start scraping</p>
      <a href="https://www.openvc.app/search" target="_blank" class="btn btn-primary btn-small">Open OpenVC Search</a>
    </div>

    <!-- Main Controls -->
    <div id="main-controls">
      <!-- Filters Section -->
      <div class="section">
        <div class="section-header" id="filter-toggle">
          <h2>Filters</h2>
          <span class="toggle-icon">▼</span>
        </div>
        <div id="filter-panel" class="filter-panel">
          <div class="filter-group">
            <label>Stage</label>
            <div class="checkbox-group">
              <label class="checkbox"><input type="checkbox" value="pre-seed" class="filter-stage"> Pre-Seed</label>
              <label class="checkbox"><input type="checkbox" value="seed" class="filter-stage"> Seed</label>
              <label class="checkbox"><input type="checkbox" value="series-a" class="filter-stage"> Series A</label>
              <label class="checkbox"><input type="checkbox" value="series-b" class="filter-stage"> Series B</label>
              <label class="checkbox"><input type="checkbox" value="growth" class="filter-stage"> Growth</label>
            </div>
          </div>

          <div class="filter-group">
            <label>Check Size</label>
            <div class="range-inputs">
              <input type="number" id="check-min" placeholder="Min ($)" class="input-small">
              <span>—</span>
              <input type="number" id="check-max" placeholder="Max ($)" class="input-small">
            </div>
          </div>

          <div class="filter-group">
            <label>Location</label>
            <input type="text" id="filter-location" placeholder="e.g. USA, Europe, Asia" class="input-full">
          </div>

          <div class="filter-group">
            <label>Sector / Vertical</label>
            <input type="text" id="filter-sector" placeholder="e.g. SaaS, Fintech, AI" class="input-full">
          </div>

          <div class="filter-group">
            <label>Investor Type</label>
            <select id="filter-type" class="input-full">
              <option value="">All Types</option>
              <option value="vc">Venture Capital</option>
              <option value="angel">Angel Investor</option>
              <option value="family-office">Family Office</option>
              <option value="corporate">Corporate VC</option>
              <option value="accelerator">Accelerator</option>
              <option value="micro-vc">Micro VC</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="checkbox">
              <input type="checkbox" id="filter-leads"> Only Lead Investors
            </label>
          </div>

          <div class="filter-group">
            <label class="checkbox">
              <input type="checkbox" id="filter-email-only"> Only with Email
            </label>
          </div>
        </div>
      </div>

      <!-- Scrape Controls -->
      <div class="section">
        <h2>Scrape</h2>
        <div class="scrape-options">
          <label class="radio-option">
            <input type="radio" name="scrape-mode" value="current" checked>
            <span>Current page</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="scrape-mode" value="all">
            <span>All pages (auto-paginate 300+ pages)</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="scrape-mode" value="profiles">
            <span>Visit each profile (detailed)</span>
          </label>
        </div>
        <button id="btn-scrape" class="btn btn-primary">
          <span class="btn-icon">🔍</span> Start Scraping
        </button>
        <button id="btn-stop" class="btn btn-danger hidden">
          <span class="btn-icon">⏹</span> Stop
        </button>
      </div>

      <!-- Progress -->
      <div id="progress-section" class="section hidden">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <p id="progress-text" class="progress-text">Scraping...</p>
      </div>

      <!-- Results -->
      <div id="results-section" class="section hidden">
        <div class="results-header">
          <h2>Results</h2>
          <span id="result-count" class="badge">0</span>
        </div>
        <div id="results-preview" class="results-preview"></div>

        <!-- Export -->
        <div class="export-buttons">
          <button id="btn-export-csv" class="btn btn-secondary">
            📄 Export CSV
          </button>
          <button id="btn-export-json" class="btn btn-secondary">
            📋 Export JSON
          </button>
          <button id="btn-copy" class="btn btn-secondary">
            📎 Copy All
          </button>
        </div>
        <button id="btn-clear" class="btn btn-ghost">Clear Results</button>
      </div>
    </div>

    <footer>
      <p>v1.0.0 • Use responsibly</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
